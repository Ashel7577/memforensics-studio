name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    outputs:
      mac_sig: ${{ steps.sign.outputs.sig }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PyInstaller and build engine binary
        run: |
          pip install pyinstaller reportlab volatility3
          cd src-tauri/engines
          pyinstaller --onefile --name memforensics_engine orchestrator.py
          cp dist/memforensics_engine ./memforensics_engine
          chmod +x ./memforensics_engine
      - run: npm install
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
      - run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: List bundle output
        run: find src-tauri/target/release/bundle -type f | head -30
      - id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.tar.gz
            src-tauri/target/release/bundle/macos/*.sig
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PyInstaller and build engine binary
        run: |
          pip install pyinstaller reportlab volatility3
          cd src-tauri/engines
          pyinstaller --onefile --name memforensics_engine orchestrator.py
          copy dist\memforensics_engine.exe .\memforensics_engine.exe
      - run: npm install
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
      - run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.sig
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  publish:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f
      - name: Generate latest.json
        run: |
          VERSION="${{ needs.build-macos.outputs.version }}"
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          MAC_SIG=$(cat artifacts/macos-build/*.sig 2>/dev/null | head -1 || echo "")
          WIN_SIG=$(cat artifacts/windows-msi/*.sig 2>/dev/null | head -1 || echo "")
          cat > artifacts/latest.json << ENDJSON
          {
            "version": "v${VERSION}",
            "notes": "MemForensics Studio v${VERSION}",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "url": "https://github.com/Ashel7577/memforensics-studio/releases/download/v${VERSION}/MemForensics.Studio_${VERSION}_aarch64.app.tar.gz",
                "signature": "${MAC_SIG}"
              },
              "darwin-x86_64": {
                "url": "https://github.com/Ashel7577/memforensics-studio/releases/download/v${VERSION}/MemForensics.Studio_${VERSION}_x64.app.tar.gz",
                "signature": "${MAC_SIG}"
              },
              "windows-x86_64": {
                "url": "https://github.com/Ashel7577/memforensics-studio/releases/download/v${VERSION}/MemForensics.Studio_${VERSION}_x64_en-US.msi.zip",
                "signature": "${WIN_SIG}"
              }
            }
          }
          ENDJSON
          cat artifacts/latest.json
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos-build/**
            artifacts/windows-msi/**
            artifacts/latest.json
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
